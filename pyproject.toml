[project]
name = "prf"
version = "0.1.0"
description = "Pseudo relevance feedback benchmarks"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "cheat-at-search @ git+https://github.com/softwaredoug/cheat-at-search.git",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.4.1",
]

[project.scripts]
prf-bm25 = "prf.runner:main"

[build-system]
requires = ["hatchling>=1.24.2"]
build-backend = "hatchling.build"

[tool.hatch.metadata]
allow-direct-references = true
