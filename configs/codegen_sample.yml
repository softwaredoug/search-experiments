strategy:
  name: codegen_sample
  type: codegen
  params:
    train:
      model: gpt-5-mini
      rounds: 5
      search_tools:
        - bm25
      start_with: null
      edit:
        guards:
          - length:
              max_lines: 10
              max_cols: 120
          - overfit:
              model: openai/gpt-5-mini
      eval:
        num_training_queries: 200
        num_validation_queries: 100
        num_test_queries: 100
        training_seed: 5678
        validation_seed: 1234
        test_seed: 42
        eval_margin: 0.003
      system_prompt: |
        Your task is to improve the reranker code so it returns more relevant results.

        Use apply_patch to edit the reranker module.
        Use run_reranker to inspect single queries and run_evals for NDCG.
        If NDCG does not improve, revert with revert_changes.
    run:
      top_k: 10
